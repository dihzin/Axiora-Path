name: CI

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: axiora
          POSTGRES_PASSWORD: axiora
          POSTGRES_DB: axiora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U axiora -d axiora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AXIORA_DATABASE_URL: postgresql+psycopg://axiora:axiora@localhost:5432/axiora
      AXIORA_REDIS_URL: redis://localhost:6379/0
      AXIORA_JWT_SECRET: ci-secret
      AXIORA_APP_ENV: staging
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run DB migrations to head
        run: python -m alembic upgrade head
      - name: Run migrate + audit guardrail
        run: bash ../../scripts/axion_db_migrate_and_audit.sh
      - name: Run critical Axion tests
        run: |
          pytest -q tests/test_axion_hardening.py
          pytest -q tests/test_axion_policy_governance.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install web dependencies
        run: npm install
      - name: Lint web
        run: npm run lint:web
      - name: Build web
        run: npm run build:web
      - name: Typecheck web
        run: npm run typecheck:web
